<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#173832" />
    <link rel="icon" href="/brand/multiplex-logo.svg" type="image/svg+xml" />
    <title>Property Defect Inspection & Repair Tracker</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17201f;
        background: #f4f7f5;
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 320px; min-height: 100vh; background: linear-gradient(180deg, rgba(23,56,50,.08), rgba(255,255,255,0) 280px), #f4f7f5; }
      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
      .app { min-height: 100vh; }
      .auth { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
      .shell-header { position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #d8dfda; background: rgba(255,255,255,.96); backdrop-filter: blur(10px); }
      .header-inner, .main { max-width: 1120px; margin: 0 auto; padding-left: 16px; padding-right: 16px; }
      .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-top: 12px; padding-bottom: 12px; }
      .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
      .brand-icon { width: 82px; height: 48px; border-radius: 8px; display: grid; place-items: center; background: #fff; padding: 6px; box-shadow: inset 0 0 0 1px rgba(199,160,82,.35); }
      .brand-icon img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
      .brand-title { font-weight: 900; color:#173832; text-transform:uppercase; letter-spacing:.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .brand-sub { margin-top: 2px; color: #64748b; font-size: 12px; font-weight:600; }
      .main { padding-top: 20px; padding-bottom: 32px; }
      .grid { display: grid; gap: 18px; }
      .layout { grid-template-columns: 1fr; }
      .panel { border: 1px solid #d8dfda; border-radius: 8px; background: #fff; padding: 16px; box-shadow: 0 12px 30px rgba(15,23,42,.07); }
      .section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
      .section-head h2 { margin: 0; font-size: 16px; color:#173832; font-weight:900; }
      .count { border-radius: 999px; background: #f7f1e3; padding: 5px 10px; color: #7a5c1f; font-size: 12px; font-weight: 800; }
      .field { display: grid; gap: 6px; color: #334155; font-size: 13px; font-weight: 700; }
      .input { width: 100%; border: 1px solid #d8dfda; border-radius: 6px; background: #fff; padding: 11px 12px; color: #17201f; outline: none; }
      .input:focus { border-color: #c7a052; box-shadow: 0 0 0 4px #eadbb4; }
      textarea.input { min-height: 94px; resize: vertical; }
      .btn { min-height: 42px; border: 0; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 13px; font-size: 14px; font-weight: 800; }
      .primary { background: #173832; color: #fff; }
      .secondary { border: 1px solid #d8dfda; background: #fff; color: #334155; }
      .danger { background: #dc2626; color: #fff; }
      .full { width: 100%; }
      .icon-btn { width: 42px; height: 42px; border: 1px solid #d8dfda; border-radius: 6px; background: #fff; }
      .role-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; border-radius: 8px; background: #eef2ef; padding: 4px; margin-bottom: 14px; }
      .role-tab { border: 0; border-radius: 6px; padding: 10px; color: #64748b; background: transparent; font-weight: 800; }
      .role-tab.active { background: #fff; color: #173832; box-shadow: 0 1px 4px rgba(15,23,42,.08); }
      .stack { display: grid; gap: 12px; }
      .case-card { width: 100%; border: 1px solid #d8dfda; border-radius: 8px; background: #fff; padding: 12px; display: flex; align-items: center; justify-content: space-between; gap: 12px; text-align: left; }
      .case-card.active { border-color: #c7a052; background: #fbf8ef; box-shadow: 0 0 0 2px #eadbb4; }
      .muted { color: #64748b; font-size: 13px; }
      .badge { border-radius: 999px; padding: 5px 10px; font-size: 12px; font-weight: 800; white-space: nowrap; }
      .badge.Draft, .badge.Pending { background: #f1f5f9; color: #475569; }
      .badge.Submitted { background: #e0f2fe; color: #0369a1; }
      .badge.InRepair, .badge.InProgress { background: #fef3c7; color: #92400e; }
      .badge.Repaired { background: #ccfbf1; color: #115e59; }
      .badge.Rejected { background: #fee2e2; color: #b91c1c; }
      .badge.Closed { background: #dcfce7; color: #166534; }
      .floor-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
      .tab { border: 1px solid #d8dfda; border-radius: 6px; background: #fff; padding: 10px 12px; font-weight: 800; color: #475569; white-space: nowrap; }
      .tab.active { border-color: #c7a052; color: #173832; background: #fbf8ef; }
      .upload { min-height: 48px; border: 1px dashed #c7a052; border-radius: 6px; background: #fbf8ef; color: #173832; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; font-weight: 800; text-align: center; }
      .upload input { display: none; }
      .matrix-wrap { position: relative; overflow: hidden; border: 1px solid #d8dfda; border-radius: 8px; background: #f1f5f9; }
      .layout-img, .layout-placeholder { aspect-ratio: 3 / 4; width: 100%; display: block; object-fit: contain; background: #fff; }
      .layout-placeholder { display: grid; place-items: center; padding: 24px; color: #64748b; text-align: center; }
      .matrix { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); }
      .zone { position: relative; border: 1px solid rgba(255,255,255,.9); background: rgba(15,23,42,.12); color: #17201f; font-size: 16px; font-weight: 900; }
      .zone.active { background: rgba(23,56,50,.65); color: #fff; }
      .zone span:first-child { background: rgba(255,255,255,.92); color: #17201f; border-radius: 999px; padding: 5px 10px; }
      .zone-count { position: absolute; right: 8px; top: 8px; border-radius: 999px; background: #f59e0b; color: #fff; padding: 2px 7px; font-size: 11px; }
      .defect { border: 1px solid #d8dfda; border-radius: 8px; background: #fff; padding: 13px; }
      .defect-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
      .defect h3 { margin: 0; font-size: 16px; }
      .defect p { margin: 8px 0 0; line-height: 1.55; }
      .photos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
      .photos img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 6px; border: 1px solid #d8dfda; }
      .empty { border-radius: 8px; background: #f8fafc; color: #64748b; padding: 12px; font-size: 14px; }
      .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .repair-box { margin-top: 12px; border-radius: 10px; background: #f0fdfa; padding: 12px; }
      .report-head { display: flex; flex-direction: column; gap: 14px; }
      .report-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .filters { display: grid; gap: 10px; }
      .auth { padding: 0; background:
        radial-gradient(circle at 18% 15%, rgba(199,160,82,.22), transparent 28%),
        linear-gradient(135deg, #173832 0%, #173832 43%, #f4f7f5 43%, #f4f7f5 100%);
      }
      .auth-luxe { width: min(1120px, calc(100vw - 28px)); display: grid; grid-template-columns: 1.05fr .95fr; min-height: 680px; border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,.28); box-shadow: 0 30px 80px rgba(15,23,42,.28); background: #fff; }
      .auth-story { position: relative; padding: 42px; color: #fff; background:
        linear-gradient(rgba(23,56,50,.76), rgba(23,56,50,.92)),
        linear-gradient(135deg, rgba(199,160,82,.22), rgba(255,255,255,0));
        display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;
      }
      .auth-story::after { content: ""; position: absolute; inset: auto -80px -120px auto; width: 330px; height: 330px; border: 1px solid rgba(199,160,82,.42); border-radius: 999px; }
      .auth-mark { width: 132px; height: 74px; border-radius: 14px; background: #fff; display: grid; place-items: center; padding: 10px; box-shadow: inset 0 0 0 2px rgba(199,160,82,.45); }
      .auth-mark img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
      .auth-story h1 { margin: 28px 0 14px; font-size: clamp(34px, 5vw, 58px); line-height: .98; letter-spacing: -.03em; }
      .auth-story p { max-width: 460px; color: rgba(255,255,255,.78); font-size: 15px; line-height: 1.7; }
      .auth-pills { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
      .auth-pills span { border: 1px solid rgba(255,255,255,.2); border-radius: 999px; padding: 8px 12px; color: rgba(255,255,255,.86); font-size: 12px; font-weight: 800; background: rgba(255,255,255,.07); }
      .auth-form-panel { padding: 42px; display: flex; flex-direction: column; justify-content: center; }
      .eyebrow { color: #9b7a35; text-transform: uppercase; letter-spacing: .12em; font-size: 11px; font-weight: 900; }
      .auth-form-panel h2 { margin: 8px 0 22px; color: #173832; font-size: 28px; line-height: 1.08; }
      .shell-header { background: #173832; border-bottom: 1px solid rgba(199,160,82,.35); box-shadow: 0 16px 40px rgba(15,23,42,.12); }
      .shell-header .brand-title { color: #fff; }
      .shell-header .brand-sub { color: rgba(255,255,255,.72); }
      .shell-header .brand-icon { background: #fff; color: #173832; }
      .shell-header .icon-btn { background: rgba(255,255,255,.08); color: #fff; border-color: rgba(255,255,255,.18); }
      .main { max-width: 1240px; padding-top: 28px; }
      .portal-banner { position: relative; overflow: hidden; border-radius: 16px; padding: 24px; margin-bottom: 20px; background: linear-gradient(135deg, #173832, #245348); color: #fff; box-shadow: 0 24px 55px rgba(23,56,50,.2); }
      .portal-banner::after { content: ""; position: absolute; right: -60px; top: -70px; width: 240px; height: 240px; border: 1px solid rgba(199,160,82,.42); border-radius: 999px; }
      .portal-banner h1 { margin: 4px 0 8px; font-size: clamp(26px, 4vw, 42px); letter-spacing: -.03em; }
      .portal-banner p { margin: 0; max-width: 680px; color: rgba(255,255,255,.76); line-height: 1.6; }
      .portal-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 18px; max-width: 620px; }
      .portal-kpis div { border: 1px solid rgba(255,255,255,.16); border-radius: 10px; padding: 12px; background: rgba(255,255,255,.08); }
      .portal-kpis strong { display: block; font-size: 22px; color: #fff; }
      .portal-kpis span { color: rgba(255,255,255,.68); font-size: 12px; font-weight: 700; }
      .panel { border-color: rgba(216,223,218,.95); }
      .panel:hover { box-shadow: 0 18px 42px rgba(15,23,42,.09); }
      .case-card, .tab, .input, .btn, .upload { transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease; }
      .case-card:hover, .btn:hover, .tab:hover { transform: translateY(-1px); }
      .primary:hover { background: #0f2924; box-shadow: 0 10px 22px rgba(23,56,50,.2); }
      .secondary:hover { border-color: #c7a052; background: #fbf8ef; }
      .layout { gap: 22px; }
      .sidebar .panel { background: rgba(255,255,255,.92); backdrop-filter: blur(10px); }
      .workspace > .panel, .workspace .panel { border-radius: 14px; }
      .matrix-wrap { box-shadow: inset 0 0 0 1px rgba(255,255,255,.6); }
      .repair-box { background: linear-gradient(135deg, #f4fbf8, #fbf8ef); border: 1px solid #d8dfda; border-radius: 8px; }
      .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
      .stat-card { border-radius: 14px; padding: 18px; background: linear-gradient(180deg,#fff,#fbfcfb); border: 1px solid #d8dfda; box-shadow: 0 12px 30px rgba(15,23,42,.06); }
      .stat-card p { margin: 0; color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; font-weight: 900; }
      .stat-card h2 { margin: 8px 0 0; font-size: 32px; color: #173832; }
      .list-card { border: 1px solid #d8dfda; border-radius: 12px; background: #fbfcfb; padding: 14px; }
      .list-card strong { color: #173832; }
      @media (min-width: 900px) {
        .layout { grid-template-columns: 390px minmax(0, 1fr); align-items: start; }
        .workspace { grid-template-columns: minmax(0, 1.05fr) minmax(360px, .95fr); }
        .report-head { flex-direction: row; align-items: flex-start; justify-content: space-between; }
        .report-actions { display: flex; }
      }
      @media (max-width: 860px) {
        .auth-luxe { grid-template-columns: 1fr; min-height: auto; }
        .auth-story { min-height: 340px; padding: 28px; }
        .auth-form-panel { padding: 24px; }
        .portal-kpis, .stat-grid { grid-template-columns: 1fr; }
      }
      @media print {
        .shell-header, .sidebar, .no-print, .upload, form, .role-tabs { display: none !important; }
        body { background: #fff; }
        .main { max-width: none; padding: 0; }
        .layout, .workspace { display: block; }
        .panel, .defect { box-shadow: none; break-inside: avoid; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const key = "property-defect-preview:data";
      const sessionKey = "property-defect-preview:session:v3";
      const zones = Array.from({ length: 9 }, (_, i) => i + 1);
      const floorNames = ["Ground Floor", "First Floor", "Second Floor", "Roof", "Yard", "Other"];
      const categories = ["Crack", "Leakage", "Paint / Finishing", "Door / Window", "Electrical", "Plumbing", "Tiles / Flooring", "Ceiling / Roof", "Safety", "Other"];
      const statuses = ["Pending", "In Progress", "Repaired", "Rejected", "Closed"];
      const now = () => new Date().toISOString();
      const id = (prefix) => `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
      const initial = {
        users: [
          { id: "admin_demo", email: "owner@example.com", name: "Owner Admin", role: "admin", createdAt: now() },
          { id: "buyer_demo", email: "buyer@example.com", name: "Demo Buyer", phone: "+60 12-345 6789", role: "buyer", createdAt: now() },
          { id: "developer_demo", email: "developer@example.com", name: "Demo Developer", role: "developer", createdBy: "admin_demo", createdAt: now() }
        ],
        projects: [
          { id: "proj_demo_1", name: "Seri Damai Residence", developerId: "developer_demo", propertyType: "Terrace House", address: "Jalan Damai 1, Kuala Lumpur", units: ["A-01", "A-02", "B-01", "B-02"], description: "Demo property list for buyer inspection selection.", createdAt: now() }
        ],
        properties: [], inspections: [], floors: [], defects: [], history: [], notifications: []
      };
      const hashPassword = (password) => `local:${btoa(unescape(encodeURIComponent(password)))}`;
      initial.users[0].username = "owner";
      initial.users[0].passwordHash = hashPassword("owner123");
      initial.users[1].username = "buyer1";
      initial.users[1].passwordHash = hashPassword("buyer123");
      initial.users[2].username = "devadmin";
      initial.users[2].passwordHash = hashPassword("admin123");
      let data = JSON.parse(localStorage.getItem(key) || "null") || initial;
      let migrated = false;
      data.users = data.users.map((u) => {
        if (u.username && u.passwordHash) return u;
        migrated = true;
        return { ...u, username: u.role === "developer" ? "devadmin" : u.role === "admin" ? "owner" : "buyer1", passwordHash: hashPassword(u.role === "developer" ? "admin123" : u.role === "admin" ? "owner123" : "buyer123") };
      });
      if (!data.users.some((u) => u.username === "owner")) { data.users.unshift(initial.users[0]); migrated = true; }
      if (!data.users.some((u) => u.username === "devadmin")) { data.users.push(initial.users[2]); migrated = true; }
      if (!data.projects) { data.projects = initial.projects; migrated = true; }
      if (migrated) localStorage.setItem(key, JSON.stringify(data));
      let session = JSON.parse(localStorage.getItem(sessionKey) || "null");
      let ui = { role: "buyer", authMode: "login", selectedInspectionId: null, selectedFloorId: null, selectedZone: 1, filterQuery: "", filterStatus: "All", dateFrom: "", dateTo: "", authError: "", accountMessage: "", projectMessage: "" };
      const save = () => localStorage.setItem(key, JSON.stringify(data));
      const setSession = (value) => { session = value; value ? localStorage.setItem(sessionKey, JSON.stringify(value)) : localStorage.removeItem(sessionKey); render(); };
      const user = () => data.users.find((u) => u.id === session?.userId);
      const fileUrls = (files) => Promise.all([...files].map((file) => new Promise((resolve) => {
        const r = new FileReader();
        r.onload = () => {
          const dataUrl = String(r.result);
          if (!file.type.startsWith("image/")) { resolve(dataUrl); return; }
          const img = new Image();
          img.onload = () => {
            const maxSide = 1280;
            const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(img.width * scale));
            canvas.height = Math.max(1, Math.round(img.height * scale));
            const ctx = canvas.getContext("2d");
            if (!ctx) { resolve(dataUrl); return; }
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.82));
          };
          img.onerror = () => resolve(dataUrl);
          img.src = dataUrl;
        };
        r.readAsDataURL(file);
      })));
      const badgeClass = (status) => "badge " + status.replace(/\s/g, "");
      const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
      const selectedInspection = () => {
        const current = user();
        if (!current) return null;
        const pool = current.role === "buyer" ? data.inspections.filter((i) => i.buyerId === current.id) : current.role === "admin" ? [] : filteredReports();
        return data.inspections.find((i) => i.id === ui.selectedInspectionId) || pool.sort((a, b) => b.updatedAt.localeCompare(a.updatedAt))[0] || null;
      };
      const filteredReports = () => data.inspections.filter((i) => i.status !== "Draft").filter((i) => {
        const p = data.properties.find((x) => x.id === i.propertyId);
        const project = data.projects.find((x) => x.id === p?.projectId);
        if (user()?.role === "developer" && project && project.developerId !== user().id) return false;
        const hay = `${p?.projectName} ${p?.unitNumber} ${p?.buyerName}`.toLowerCase();
        const reportDate = (i.submittedAt || i.createdAt).slice(0, 10);
        return hay.includes(ui.filterQuery.toLowerCase()) && (ui.filterStatus === "All" || i.status === ui.filterStatus) && (!ui.dateFrom || reportDate >= ui.dateFrom) && (!ui.dateTo || reportDate <= ui.dateTo);
      });
      function log(defect, fromStatus, toStatus, note) {
        data.history.push({ id: id("hist"), defectId: defect.id, fromStatus, toStatus, changedBy: user().id, role: user().role, note, createdAt: now() });
      }
      function render() {
        const current = user();
        document.getElementById("app").innerHTML = current ? shell2(current) : auth2();
        bind();
      }
      function auth() {
        return `<main class="auth"><section class="panel" style="max-width:440px;width:100%">
          <div class="brand" style="margin-bottom:18px"><div class="brand-icon">✓</div><div><div class="brand-title">Property Defect Inspection & Repair Tracker</div><div class="brand-sub">Mobile inspection and repair workflow MVP</div></div></div>
          <div class="role-tabs"><button class="role-tab ${ui.role === "buyer" ? "active" : ""}" data-role="buyer">Buyer</button><button class="role-tab ${ui.role === "developer" ? "active" : ""}" data-role="developer">Developer</button></div>
          <form id="authForm" class="stack">
            <label class="field">Username<input class="input" name="username" autocomplete="username" required value="${ui.role === "buyer" ? "buyer1" : "devadmin"}"></label>
            <label class="field">Password<input class="input" type="password" name="password" autocomplete="current-password" required value="${ui.role === "buyer" ? "buyer123" : "admin123"}"></label>
            ${ui.authError ? `<p class="empty" style="background:#fee2e2;color:#b91c1c;font-weight:800">${esc(ui.authError)}</p>` : ""}
            <p class="empty">Demo credentials: buyer1 / buyer123, devadmin / admin123. New accounts are assigned by developers.</p>
            <button class="btn primary full">Log in</button>
          </form>
        </section></main>`;
      }
      function shell(current) {
        return `<div class="app"><header class="shell-header"><div class="header-inner"><div class="brand"><div class="brand-icon">✓</div><div><div class="brand-title">Property Defect Tracker</div><div class="brand-sub">${esc(current.name)} - ${current.role === "developer" ? "Developer" : "Buyer"}</div></div></div><button class="icon-btn" id="logout" title="Log out">↗</button></div></header><main class="main"><div class="panel no-print" style="margin-bottom:18px;color:#475569">Backend mode: Local MVP storage. React/Supabase source files are in the project folder.</div>${current.role === "buyer" ? buyer(current) : developer(current)}</main></div>`;
      }
      function buyer(current) {
        const inspections = data.inspections.filter((i) => i.buyerId === current.id).sort((a, b) => b.updatedAt.localeCompare(a.updatedAt));
        const selected = selectedInspection();
        return `<div class="grid layout"><aside class="sidebar stack">${newCaseForm()}${caseList(inspections, "My inspections")}</aside>${selected ? workspace(selected) : empty()}</div>`;
      }
      function newCaseForm() {
        return `<form class="panel stack" id="newCase"><div class="section-head"><h2>New inspection</h2><span class="count">+</span></div>
          <label class="field">Project name<input class="input" name="projectName" required placeholder="e.g. Taman Seri Aman"></label>
          <label class="field">Unit number<input class="input" name="unitNumber" required placeholder="e.g. A-12-03"></label>
          <label class="field">Buyer name<input class="input" name="buyerName" required></label>
          <label class="field">Contact number<input class="input" name="contactNumber" required></label>
          <button class="btn primary full">Create case</button>
        </form>`;
      }
      function developer() {
        const reports = filteredReports().sort((a, b) => b.updatedAt.localeCompare(a.updatedAt));
        const selected = selectedInspection();
        return `<div class="grid layout"><aside class="sidebar stack"><section class="panel"><div class="section-head"><h2>Developer dashboard</h2><span class="count">${reports.length}</span></div><div class="filters">

        const popup = window.open("", "_blank", "width=900,height=1200");
        if (!popup) return;
        popup.document.write(`<!doctype html><html><head><title>Defect Report - ${esc(property.unitNumber)}</title><style>body{font-family:Arial,sans-serif;color:#17201f;margin:28px;line-height:1.45}button{padding:10px 14px;border:0;border-radius:8px;background:#0f766e;color:white;font-weight:700}h1{color:#0f766e;margin-bottom:8px}h2{border-bottom:2px solid #0f766e;padding-bottom:8px;margin-top:30px}.report-meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 22px;margin:18px 0}.report-layout-wrap{position:relative;width:100%;max-width:680px;margin:0 0 18px;border:1px solid #ccd8d5;border-radius:8px;overflow:hidden;background:#fff}.report-layout{display:block;width:100%;aspect-ratio:3/4;object-fit:contain}.report-layout-empty{aspect-ratio:3/4;display:grid;place-items:center;color:#64748b;background:#f8fafc}.report-zones{display:grid;grid-template-columns:repeat(3,1fr);overflow:hidden}.report-zones.report-overlay{position:absolute;inset:0}.report-zone{min-height:76px;border:1px solid rgba(15,23,42,.55);display:grid;place-items:center;text-align:center;color:#17201f;background:rgba(255,255,255,.2)}.report-zone strong{display:block;color:#17201f;font-size:20px}.report-zone span{font-size:11px}.report-zone.filled{background:rgba(20,184,166,.38);color:#115e59;font-weight:bold}.report-defect{break-inside:avoid;border:1px solid #ccd8d5;border-radius:10px;padding:16px;margin:16px 0}.report-photos{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.report-photos img{width:100%;height:160px;object-fit:cover;border-radius:8px;border:1px solid #dbe7e4}@media print{button{display:none}body{margin:14px}.report-layout-wrap{max-width:620px}}@media(max-width:720px){.report-meta{grid-template-columns:1fr}}</style></head><body><button onclick="window.print()">Print / Save as PDF</button><h1>Property Defect Inspection & Repair Report</h1><div class="report-meta"><div><strong>Project:</strong> ${esc(property.projectName)}</div><div><strong>Property type:</strong> ${esc(project?.propertyType || "-")}</div><div><strong>Project address:</strong> ${esc(project?.address || "-")}</div><div><strong>Developer:</strong> ${esc(developer?.name || "-")}</div><div><strong>Unit:</strong> ${esc(property.unitNumber)}</div><div><strong>Buyer:</strong> ${esc(property.buyerName)}</div><div><strong>Buyer account:</strong> ${esc(buyer?.username || "-")}</div><div><strong>Contact:</strong> ${esc(property.contactNumber)}</div><div><strong>Status:</strong> ${esc(inspection.status)}</div><div><strong>Total floors:</strong> ${floors.length}</div><div><strong>Total defects:</strong> ${defects.length}</div><div><strong>Created:</strong> ${new Date(inspection.createdAt).toLocaleString()}</div><div><strong>Updated:</strong> ${new Date(inspection.updatedAt).toLocaleString()}</div><div><strong>Submitted:</strong> ${inspection.submittedAt ? new Date(inspection.submittedAt).toLocaleString() : "-"}</div></div>${floorHtml}</body></html>`);
        popup.document.close();
      }
      function bind() {
        document.querySelectorAll("[data-role]").forEach((b) => b.onclick = () => { ui.role = b.dataset.role; ui.authMode = "login"; ui.authError = ""; render(); });
        document.querySelectorAll("[data-auth-mode]").forEach((b) => b.onclick = () => { ui.authMode = b.dataset.authMode; ui.authError = ""; render(); });
        document.getElementById("authForm")?.addEventListener("submit", (e) => {
          e.preventDefault(); const f = new FormData(e.target); const role = ui.role; const username = String(f.get("username")).trim().toLowerCase(); const passwordHash = hashPassword(String(f.get("password") || "")); let profile = data.users.find((u) => u.username?.toLowerCase() === username && u.role === role && u.passwordHash === passwordHash);
          if (!profile) { ui.authError = "Invalid username, password, or role."; render(); return; }
          setSession({ userId: profile.id });
        });
        document.getElementById("registerForm")?.addEventListener("submit", (e) => {
          e.preventDefault(); const f = new FormData(e.target); const username = String(f.get("username")).trim().toLowerCase(); const password = String(f.get("password") || "");
          if (password.length < 6) { ui.authError = "Password must be at least 6 characters."; render(); return; }
          if (data.users.some((u) => u.username?.toLowerCase() === username)) { ui.authError = "Username already exists."; render(); return; }
          data.users.push({ id: id("usr"), username, passwordHash: hashPassword(password), email: String(f.get("email") || "").trim().toLowerCase(), name: String(f.get("name") || username), phone: String(f.get("phone") || ""), role: "buyer", createdBy: "self-registration", createdAt: now() });
          ui.authMode = "login"; ui.authError = "Buyer account created. You can log in now."; save(); render();
        });
        document.getElementById("accountForm")?.addEventListener("submit", (e) => {
          e.preventDefault(); const f = new FormData(e.target); const username = String(f.get("username")).trim().toLowerCase(); const password = String(f.get("password") || "");
          if (password.length < 6) { ui.accountMessage = "Password must be at least 6 characters."; render(); return; }
          if (data.users.some((u) => u.username?.toLowerCase() === username)) { ui.accountMessage = "Username already exists."; render(); return; }
          data.users.push({ id: id("usr"), username, passwordHash: hashPassword(password), email: String(f.get("email") || "").trim().toLowerCase(), name: String(f.get("name") || username), role: "developer", createdBy: user().id, createdAt: now() });
          ui.accountMessage = "Developer login created."; save(); render();
        });
        document.getElementById("projectForm")?.addEventListener("submit", (e) => {
          e.preventDefault(); const f = new FormData(e.target); const units = String(f.get("units") || "").split(",").map((x) => x.trim()).filter(Boolean);
          data.projects.push({ id: id("proj"), name: String(f.get("name") || "").trim(), developerId: user().id, propertyType: String(f.get("propertyType") || "").trim(), address: String(f.get("address") || "").trim(), units, description: String(f.get("description") || "").trim(), createdAt: now() });
          ui.projectMessage = "Project saved for buyer selection."; save(); render();
        });
        document.getElementById("logout")?.addEventListener("click", () => setSession(null));
        document.getElementById("newCase")?.addEventListener("submit", (e) => {
          e.preventDefault(); const f = new FormData(e.target); const propertyId = id("prop"); const inspectionId = id("insp"); const floorId = id("floor"); const t = now();
          const project = data.projects.find((p) => p.id === String(f.get("projectId") || ""));
          data.properties.push({ id: propertyId, projectId: project?.id, projectName: project?.name || "", unitNumber: f.get("unitNumber"), buyerName: f.get("buyerName"), contactNumber: f.get("contactNumber"), buyerId: user().id, createdAt: t });
          data.inspections.push({ id: inspectionId, propertyId, buyerId: user().id, status: "Draft", createdAt: t, updatedAt: t });
          data.floors.push({ id: floorId, inspectionId, name: "Ground Floor", createdAt: t });
          ui.selectedInspectionId = inspectionId; ui.selectedFloorId = floorId; save(); render();
        });
        document.querySelectorAll("[data-case]").forEach((b) => b.onclick = () => { ui.selectedInspectionId = b.dataset.case; ui.selectedFloorId = null; ui.selectedZone = 1; render(); });
        document.querySelectorAll("[data-floor]").forEach((b) => b.onclick = () => { ui.selectedFloorId = b.dataset.floor; render(); });
        document.querySelectorAll("[data-zone]").forEach((b) => b.onclick = () => { ui.selectedZone = Number(b.dataset.zone); render(); });
        document.getElementById("addFloor")?.addEventListener("submit", (e) => {
          e.preventDefault(); const f = new FormData(e.target); const floorId = id("floor"); const inspection = selectedInspection();
          data.floors.push({ id: floorId, inspectionId: inspection.id, name: String(f.get("floorName")), otherName: String(f.get("floorName")) === "Other" ? String(f.get("otherName") || "Other") : "", createdAt: now() });
          ui.selectedFloorId = floorId; inspection.updatedAt = now(); save(); render();
        });
        document.getElementById("editFloor")?.addEventListener("submit", (e) => {
          e.preventDefault(); const f = new FormData(e.target); const floor = data.floors.find((x) => x.id === ui.selectedFloorId); if (!floor) return;
          floor.name = String(f.get("floorName")); floor.otherName = floor.name === "Other" ? String(f.get("otherName") || "Other") : ""; selectedInspection().updatedAt = now(); save(); render();
        });
        document.getElementById("layoutUpload")?.addEventListener("change", async (e) => {
          if (!e.target.files?.length) return; const [url] = await fileUrls(e.target.files); const floor = data.floors.find((f) => f.id === ui.selectedFloorId); floor.layoutPhotoUrl = url; save(); render();
        });
        document.getElementById("layoutDelete")?.addEventListener("click", () => {
          const floor = data.floors.find((f) => f.id === ui.selectedFloorId); if (floor) delete floor.layoutPhotoUrl; save(); render();
        });
        document.getElementById("defectForm")?.addEventListener("submit", async (e) => {
          e.preventDefault(); const f = new FormData(e.target); const photoInput = e.target.querySelector('input[name="photos"]'); const photos = photoInput?.files?.length ? await fileUrls(photoInput.files) : []; const inspection = selectedInspection(); const defect = { id: id("def"), inspectionId: inspection.id, floorId: ui.selectedFloorId, zoneNumber: ui.selectedZone, title: f.get("title"), description: f.get("description"), category: f.get("category"), buyerPhotoUrls: photos, repairPhotoUrls: [], status: "Pending", createdAt: now(), updatedAt: now() };
          data.defects.push(defect); log(defect, null, "Pending", "Defect created by buyer"); inspection.updatedAt = now(); save(); render();
        });
        document.querySelectorAll(".repairForm").forEach((form) => form.addEventListener("submit", async (e) => {
          e.preventDefault(); const f = new FormData(form); const defect = data.defects.find((d) => d.id === form.dataset.defect); const photoInput = form.querySelector('input[name="photos"]'); const newPhotos = photoInput?.files?.length ? await fileUrls(photoInput.files) : []; const old = defect.status; defect.status = String(f.get("status")); defect.contractor = String(f.get("contractor") || ""); defect.repairRemarks = String(f.get("remarks") || ""); defect.repairPhotoUrls.push(...newPhotos); defect.updatedAt = now(); if (old !== defect.status) log(defect, old, defect.status, defect.repairRemarks);
          const inspection = data.inspections.find((i) => i.id === defect.inspectionId); inspection.status = data.defects.filter((d) => d.inspectionId === inspection.id).every((d) => d.status === "Closed") ? "Closed" : "In Repair"; inspection.updatedAt = now(); save(); render();
        }));
        document.querySelectorAll("[data-accept]").forEach((b) => b.onclick = () => { const d = data.defects.find((x) => x.id === b.dataset.accept); const old = d.status; d.status = "Closed"; d.acceptedAt = now(); log(d, old, "Closed", "Buyer accepted repair"); save(); render(); });
        document.querySelectorAll("[data-reject]").forEach((b) => b.onclick = () => { const d = data.defects.find((x) => x.id === b.dataset.reject); const old = d.status; d.status = "Rejected"; d.rejectedReason = prompt("Reason for rejecting this repair?") || "Buyer rejected repair"; log(d, old, "Rejected", d.rejectedReason); save(); render(); });
        document.getElementById("submitReport")?.addEventListener("click", () => { const i = selectedInspection(); i.status = "Submitted"; i.submittedAt = now(); i.updatedAt = now(); save(); render(); });
        document.getElementById("pdf")?.addEventListener("click", () => openReport());
        ["filterQuery", "filterStatus", "dateFrom", "dateTo"].forEach((x) => document.getElementById(x)?.addEventListener("input", (e) => { ui[x] = e.target.value; render(); }));
      }
      render();
    </script>
  </body>
</html>
